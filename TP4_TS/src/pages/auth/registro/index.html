<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Registro - Food Store</title>
    <link rel="stylesheet" href="../../../css/styles.css" />
  </head>
  <body>
    <h1>Registro</h1>

    <form id="form-registro">
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="tucorreo@mail.com" required />
      </div>

      <div>
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" required />
      </div>

      <p id="error-msg" style="color: red; display: none;"></p>

      <button type="submit" class="btn-primary">Registrarse</button>
    </form>

    <p>¿Ya tenés cuenta? <a href="../login/index.html">Iniciá sesión</a></p>

    <script type="module" src="./registro.ts"></script>
  </body>
</html>
