<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Food Store</title>
    <link rel="stylesheet" href="/src/css/styles.css" />
</head>
<body class="auth-body">
    
    <header>
        <h1>Food Store</h1>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Registro</h2>
            
            <form id="form-registro">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="tucorreo@mail.com" required />
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Mínimo 6 caracteres" required />
                </div>
                
                <p id="error-msg" class="error-msg" style="display: none;"></p>
                
                <button type="submit" class="btn-primary">Registrarse</button>
            </form>
            
            <p>¿Ya tenés cuenta? <a href="/src/pages/auth/login/index.html">Iniciá sesión</a></p>
        </div>
    </main>

    <script type="module" src="./registro.ts"></script>
</body>
</html>
