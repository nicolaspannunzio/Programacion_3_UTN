<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Login - Food Store</title>
    <link rel="stylesheet" href="../../../css/styles.css" />
  </head>
  <body>
    <h1>Iniciar Sesión</h1>

    <form id="form-login">
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="tucorreo@mail.com" required />
      </div>

      <div>
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Tu contraseña" required />
      </div>

      <p id="error-msg" style="color: red; display: none;"></p>

      <button type="submit" class="btn-primary">Ingresar</button>    </form>

    <p>¿No tenés cuenta? <a href="../registro/index.html">Registrate</a></p>

    <script type="module" src="./login.ts"></script>
  </body>
</html>
