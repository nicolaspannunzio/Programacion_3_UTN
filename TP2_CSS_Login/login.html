<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Login - Food Store</title>
</head>

<body>
    <form action="">
        <h1>Food Store</h1>
        <h2>Iniciar Sesión</h2>

        <div>
            <label for="correo">Email:</label>
            <input type="email" id="correo" name="correo" placeholder="tucorreo@mail.com" required>
        </div>

        <div>
            <label for="clave">Contraseña:</label>
            <input type="password" id="clave" name="clave" placeholder="Mínimo 8 caracteres" required>
        </div>

        <button type="submit">INGRESAR</button>
        
        <a href="registro.html">¿No tenés cuenta? Registrate acá</a>
    </form>
</body>
</html>
